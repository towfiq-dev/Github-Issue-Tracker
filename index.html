<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Your website short description here">
    <meta name="keywords" content="HTML, CSS, JavaScript, Web Design">
    <meta name="author" content="Your Name">
    <meta name="robots" content="index, follow">
    <!-- fav-icon -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- external CSS -->
    <link rel="stylesheet" href="./style.css">
    <!-- tailwind & daisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Sign In section -->
<section id="login-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <img src="./assets/github-logo.png" class="w-20 mx-auto mb-4">
                <h2 class="text-3xl font-bold text-gray-800">GitHub Issues Tracker</h2>
                <p class="text-gray-500 mt-2">Sign in to manage your issues</p>
            </div>

            <div class="space-y-4">
                <div class="form-control">
                    <label class="label"><span class="label-text font-semibold">Username</span></label>
                    <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full focus:ring-2 focus:ring-primary" />
                    <p class="text-[#4A00FF]">Default: admin</p>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-semibold">Password</span></label>
                    <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full" />
                    <p class="text-[#4A00FF]">Default: admin123</p>
                </div>
                <button onclick="handleLogin()" class="btn btn-primary w-full mt-4 text-lg">Sign In</button>

            <p class="text-[18px] font-semibold text-center">
                - - - - - - - - - - - - - OR - - - - - - - - - - - - -
            </p>

            </div>
            <p class="text-[20px] text-center mt-6 text-[#64748B] font-medium">Demo Credentials:</p>
            <div class="mt-3 p-4 bg-blue-50 rounded-lg border border-blue-100 text-center">
                    <p class="text-4 text-black-500 mt-1"><span class="font-bold">User: </span>admin</p>
                <p class="text-4 text-black-500 mt-1"><span class="font-bold">Pass: </span>admin123</p>
                
            </div>
        </div>
    </section>
  <!-- external JS -->
  <script src="./script.js"></script>
</body>
</html>
